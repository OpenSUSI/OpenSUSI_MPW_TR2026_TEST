name: Import Submission

concurrency:
  group: opensusi-mpw-main
  cancel-in-progress: false

on:
  workflow_dispatch:
    inputs:
      order_id:
        required: true
        type: string
      github_id:
        required: true
        type: string
      source_repo:
        required: true
        type: string
      source_run_id:
        required: true
        type: string
      source_artifact_name:
        required: true
        default: "GDSII_MDP"
        type: string
      target_dir:
        required: true
        type: string

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  import:
    runs-on: ubuntu-latest

    permissions:
      contents: write
      actions: write

    steps:
      - name: Create GitHub App token
        id: app-token
        uses: actions/create-github-app-token@v1
        with:
          app-id: ${{ secrets.GH_APP_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          owner: OpenSUSI

      - uses: actions/checkout@v4
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: Download artifact
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          SOURCE_REPO: ${{ inputs.source_repo }}
          SOURCE_RUN_ID: ${{ inputs.source_run_id }}
          SOURCE_ARTIFACT_NAME: ${{ inputs.source_artifact_name }}
        run: |
          set -euo pipefail
          mkdir -p work

          JSON=$(curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${SOURCE_REPO}/actions/runs/${SOURCE_RUN_ID}/artifacts")

          ARTIFACT_ID=$(python3 scripts/resolve_artifact_id.py \
            --json-file <(echo "$JSON") \
            --artifact-name "${SOURCE_ARTIFACT_NAME}")

          curl -fsSL \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${SOURCE_REPO}/actions/artifacts/${ARTIFACT_ID}/zip" \
            -o work/submission.zip

      - name: Extract GDS
        env:
          TARGET_DIR: ${{ inputs.target_dir }}
        run: |
          set -euo pipefail

          unzip -o work/submission.zip -d work/unpacked
          mkdir -p "${TARGET_DIR}"

          GDS_FILE=$(find work/unpacked -type f \( -name "*.gds" -o -name "*.gdsii" \))

          COUNT=$(echo "$GDS_FILE" | wc -l)
          if [ "$COUNT" -ne 1 ]; then
            echo "Expected exactly one GDS file, found: $COUNT"
            exit 1
          fi

          cp "$GDS_FILE" "${TARGET_DIR}/GDSII_MDP.gds"

      - name: Write manifest
        run: |
          python3 scripts/write_import_manifest.py \
            --target-dir "${{ inputs.target_dir }}" \
            --order-id "${{ inputs.order_id }}" \
            --github-id "${{ inputs.github_id }}" \
            --source-repo "${{ inputs.source_repo }}" \
            --source-run-id "${{ inputs.source_run_id }}" \
            --source-artifact-name "${{ inputs.source_artifact_name }}"

      - name: Commit
        run: |
          set -euo pipefail

          git config user.name "opensusi-bot"
          git config user.email "bot@opensusi.org"

          git add -f "${{ inputs.target_dir }}/GDSII_MDP.gds"
          git add -f "${{ inputs.target_dir }}/manifest.json"

          git commit -m "Import ${{ inputs.github_id }} (${{ inputs.order_id }})" || echo "No changes"
          git push

      - name: Trigger aggregate
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          curl -fsSL -X POST \
            -H "Authorization: Bearer ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/actions/workflows/aggregate-layout.yml/dispatches" \
            -d '{"ref":"main"}'