name: Aggregate Layout

concurrency:
  group: opensusi-aggregate-main
  cancel-in-progress: false

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - "users/**"
      - "info.yaml"
      - "scripts/**"
      - ".github/workflows/aggregate-layout.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  aggregate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 0

      - name: Sync main
        run: |
          set -euo pipefail
          git pull --rebase origin main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          set -euo pipefail
          python3 -m pip install --upgrade pip
          python3 -m pip install pyyaml klayout

      - name: Aggregate
        run: |
          set -euo pipefail

          mkdir -p project

          python3 scripts/aggregate_submission.py \
            --info-yaml info.yaml \
            --users-dir users \
            --output-gds project/ALL_GDSII_MDP.gds \
            --output-manifest project/manifest.json

      - name: Generate views
        run: |
          set -euo pipefail

          python3 scripts/generate_users_md.py \
            --manifest project/manifest.json \
            --output USERS.md

          python3 scripts/generate_users_svg.py \
            --manifest project/manifest.json \
            --output USERS.svg \
            --repo-owner "${{ github.repository_owner }}" \
            --repo-name "${{ github.event.repository.name }}" \
            --branch "main"

      - name: Commit and push with retry
        run: |
          set -euo pipefail

          git config user.name "opensusi-bot"
          git config user.email "bot@opensusi.org"

          rebuild_outputs() {
            mkdir -p project

            python3 scripts/aggregate_submission.py \
              --info-yaml info.yaml \
              --users-dir users \
              --output-gds project/ALL_GDSII_MDP.gds \
              --output-manifest project/manifest.json

            python3 scripts/generate_users_md.py \
              --manifest project/manifest.json \
              --output USERS.md

            python3 scripts/generate_users_svg.py \
              --manifest project/manifest.json \
              --output USERS.svg \
              --repo-owner "${{ github.repository_owner }}" \
              --repo-name "${{ github.event.repository.name }}" \
              --branch "main"
          }

          stage_outputs() {
            git add -f project/manifest.json
            git add -f project/ALL_GDSII_MDP.gds
            git add -f USERS.md
            git add -f USERS.svg
          }

          stage_outputs

          if git diff --cached --quiet; then
            echo "No changes"
            exit 0
          fi

          git commit -m "Update aggregated layout"

          for attempt in 1 2 3 4 5; do
            echo "Push attempt ${attempt}"

            if git push origin HEAD:main; then
              echo "Push succeeded"
              exit 0
            fi

            echo "Push failed. Remote main was updated. Re-sync and rebuild."

            git fetch origin main
            git reset --hard origin/main

            rebuild_outputs
            stage_outputs

            if git diff --cached --quiet; then
              echo "No changes after re-sync"
              exit 0
            fi

            git commit -m "Update aggregated layout"
            sleep $((attempt * 3))
          done

          echo "Failed to push after retries"
          exit 1