name: Aggregate Layout

concurrency:
  group: opensusi-mpw-main
  cancel-in-progress: false

on:
  workflow_dispatch:
  push:
    paths:
      - "users/**"
      - "info.yaml"
      - "scripts/**"
      - ".github/workflows/aggregate-layout.yml"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  aggregate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install pyyaml klayout

      - name: Aggregate
        run: |
          mkdir -p project

          python3 scripts/aggregate_submission.py \
            --info-yaml info.yaml \
            --users-dir users \
            --output-gds project/ALL_GDSII_MDP.gds \
            --output-manifest project/manifest.json

      - name: Generate views
        run: |
          python3 scripts/generate_users_md.py \
            --manifest project/manifest.json \
            --output USERS.md

          python3 scripts/generate_users_svg.py \
            --manifest project/manifest.json \
            --output USERS.svg \
            --repo-owner "${{ github.repository_owner }}" \
            --repo-name "${{ github.event.repository.name }}" \
            --branch "${{ github.ref_name }}"

      - name: Commit
        run: |
          git config user.name "opensusi-bot"
          git config user.email "bot@opensusi.org"

          git add -f project/manifest.json
          git add -f project/ALL_GDSII_MDP.gds
          git add -f USERS.md
          git add -f USERS.svg

          git commit -m "Update aggregated layout" || echo "No changes"
          git push