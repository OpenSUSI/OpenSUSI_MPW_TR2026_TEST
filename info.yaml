# OpenSUSI TR-1um MPW project information

# ----------------------------
# Aggregate configuration
# ----------------------------
aggregate:
  top_cell: AGGREGATED_TOP

  pitch:
    x: 2500.0
    y: 2500.0

  grid:
    x: 8
    y: 8

  teg_gds:  users/000_system/GDSII_TEG.gds
  fill_gds: users/000_system/GDSII_FILL.gds

# ----------------------------
# Logo configuration
# ----------------------------
logo:
  dir: logos
  default: OpenSUSI_LOGO.gds

  # expected logo bbox (centered origin)
  bbox:
    x: 160.0
    y: 160.0

  placements:
    top_left:
      x: -1040.0
      y: 1040.0

    top_right:
      x: 1040.0
      y: 1040.0

    bottom_right:
      x: 1040.0
      y: -1040.0

# ----------------------------
# XY mark configuration
# ----------------------------
xy_mark:
  layer: [13, 0]

  # expected text bbox
  bbox:
    x: 160.0
    y: 110.0

  placement:
    x: -1120.0
    y: -920.0

  format: "2026F:X{col}Y{row}"

  # glyph library GDS
  text_gds: logos/NUMBERS.gds

# ----------------------------
# Tile-based logo map
# ----------------------------
logo_map: logo_map.yaml